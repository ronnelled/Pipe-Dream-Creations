name: Deploy static site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Verify required pages exist
        run: |
          test -f index.html || (echo "Missing index.html" && exit 1)
          test -f pages/about.html || (echo "Missing pages/about.html" && exit 1)
          test -f pages/products.html || (echo "Missing pages/products.html" && exit 1)
          test -f pages/contact.html || (echo "Missing pages/contact.html" && exit 1)
          test -f pages/faq.html || (echo "Missing pages/faq.html" && exit 1)

      - name: Verify stylesheet exists if referenced
        run: |
          if grep -R 'Week 5/css/styles.css' index.html pages/*.html; then
            test -f "Week 5/css/styles.css" || (echo "Referenced Week 5/css/styles.css but file is missing" && exit 1)
          fi
          if grep -R 'css/styles.css' index.html pages/*.html; then
            test -f "css/styles.css" || (echo "Referenced css/styles.css but file is missing" && exit 1)
          fi

      - name: Verify script exists if referenced
        run: |
          if grep -R 'Week 5/js/main.js' index.html pages/*.html; then
            test -f "Week 5/js/main.js" || (echo "Referenced Week 5/js/main.js but file is missing" && exit 1)
          fi
          if grep -R 'js/main.js' index.html pages/*.html; then
            test -f "js/main.js" || (echo "Referenced js/main.js but file is missing" && exit 1)
          fi

      - name: Fail if placeholder text exists
        run: |
          if grep -R -i "coming soon" index.html pages/*.html; then
            echo "Placeholder text 'Coming soon' still exists."
            exit 1
          fi

      - name: Print file tree
        run: find . -maxdepth 4 -type f

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
